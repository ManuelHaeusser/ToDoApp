<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Fehler')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar('')}"></nav>

<main class="container">
    <div class="text-center py-5">
        <h1 class="h3 mb-3">Es ist ein Fehler aufgetreten</h1>
        <p class="text-muted" th:text="${errorMessage} ?: 'Die Seite konnte nicht geladen werden.'">
            Fehlermeldung</p>
        <a th:href="@{/tasks}" class="btn btn-primary">Zurück zur Übersicht</a>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
