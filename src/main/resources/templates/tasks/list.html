<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Aufgaben')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar('tasks')}"></nav>

<main class="container">
    <div th:replace="~{fragments/layout :: messages}"></div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">Aufgaben</h1>
        <a th:href="@{/tasks/new}" class="btn btn-primary">+ Neue Aufgabe</a>
    </div>

    <!-- Filterleiste -->
    <div class="card mb-4">
        <div class="card-body">
            <div class="row g-2 align-items-end">
                <div class="col-sm-4">
                    <label class="form-label small text-muted mb-1">Status</label>
                    <div class="btn-group w-100" role="group">
                        <a th:href="@{/tasks}" class="btn btn-outline-secondary btn-sm"
                           th:classappend="${selectedStatus == null and selectedCategory == null}
                                           ? 'active'">Alle</a>
                        <a th:href="@{/tasks(status='open')}" class="btn btn-outline-secondary btn-sm"
                           th:classappend="${selectedStatus == 'open'} ? 'active'">Offen</a>
                        <a th:href="@{/tasks(status='done')}" class="btn btn-outline-secondary btn-sm"
                           th:classappend="${selectedStatus == 'done'} ? 'active'">Erledigt</a>
                    </div>
                </div>
                <div class="col-sm-5">
                    <label for="categoryFilter" class="form-label small text-muted mb-1">Kategorie</label>
                    <select id="categoryFilter" class="form-select form-select-sm"
                            onchange="if(this.value){window.location='/tasks?categoryId='+this.value;}
                                      else{window.location='/tasks';}">
                        <option value="">Alle Kategorien</option>
                        <option th:each="c : ${categories}" th:value="${c.id}"
                                th:text="${c.name}"
                                th:selected="${selectedCategory != null and selectedCategory == c.id}">
                        </option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <!-- Leerer Zustand -->
    <div th:if="${#lists.isEmpty(tasks)}" class="text-center text-muted py-5">
        <p class="mb-2">Keine Aufgaben vorhanden.</p>
        <a th:href="@{/tasks/new}" class="btn btn-outline-primary btn-sm">Erste Aufgabe anlegen</a>
    </div>

    <!-- Aufgabentabelle -->
    <div class="table-responsive" th:unless="${#lists.isEmpty(tasks)}">
        <table class="table table-hover align-middle">
            <thead>
            <tr>
                <th scope="col" style="width: 3rem;">Status</th>
                <th scope="col">Titel</th>
                <th scope="col">Kategorie</th>
                <th scope="col">Priorität</th>
                <th scope="col">Fällig</th>
                <th scope="col" class="text-end">Aktionen</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="task : ${tasks}">
                <td>
                    <form th:action="@{/tasks/{id}/toggle(id=${task.id})}" method="post">
                        <button type="submit" class="btn btn-sm btn-link p-0 fs-5 text-decoration-none"
                                th:title="${task.completed} ? 'Als offen markieren'
                                                            : 'Als erledigt markieren'"
                                th:text="${task.completed} ? '☑' : '☐'">☐</button>
                    </form>
                </td>
                <td>
                    <span th:text="${task.title}"
                          th:classappend="${task.completed} ? 'task-done'">Titel</span>
                    <div class="small text-muted text-truncate" style="max-width: 22rem;"
                         th:if="${task.description != null and !task.description.isBlank()}"
                         th:text="${task.description}">Beschreibung</div>
                </td>
                <td>
                    <span class="d-inline-flex align-items-center gap-1">
                        <span class="cat-dot"
                              th:style="'background-color:' + ${task.category.color}"></span>
                        <span th:text="${task.category.name}">Kategorie</span>
                    </span>
                </td>
                <td>
                    <span class="badge"
                          th:classappend="${task.priority.name() == 'HIGH'} ? 'text-bg-danger'
                              : (${task.priority.name() == 'MEDIUM'} ? 'text-bg-warning'
                              : 'text-bg-secondary')"
                          th:text="${task.priority.label}">Priorität</span>
                </td>
                <td>
                    <span th:if="${task.dueDate != null}"
                          th:text="${#temporals.format(task.dueDate, 'dd.MM.yyyy')}"
                          th:classappend="${task.dueDate.isBefore(#temporals.createToday())
                                          and !task.completed} ? 'text-danger fw-semibold'">Datum</span>
                    <span th:unless="${task.dueDate != null}" class="text-muted">—</span>
                </td>
                <td class="text-end">
                    <a th:href="@{/tasks/{id}/edit(id=${task.id})}"
                       class="btn btn-sm btn-outline-secondary">Bearbeiten</a>
                    <form th:action="@{/tasks/{id}/delete(id=${task.id})}" method="post"
                          class="d-inline"
                          onsubmit="return confirm('Aufgabe wirklich löschen?');">
                        <button type="submit" class="btn btn-sm btn-outline-danger">Löschen</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
