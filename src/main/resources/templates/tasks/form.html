<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Aufgabe bearbeiten')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar('tasks')}"></nav>

<main class="container">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <h1 class="h3 mb-4" th:text="${editMode} ? 'Aufgabe bearbeiten' : 'Neue Aufgabe'">
                Aufgabe</h1>

            <!-- Hinweis, falls noch keine Kategorie existiert -->
            <div th:if="${#lists.isEmpty(categories)}" class="alert alert-warning">
                Es existiert noch keine Kategorie. Bitte zuerst eine
                <a th:href="@{/categories/new}" class="alert-link">Kategorie anlegen</a>.
            </div>

            <form th:object="${taskForm}" method="post"
                  th:action="${editMode}
                              ? @{/tasks/{id}(id=${taskForm.id})}
                              : @{/tasks}">

                <div class="mb-3">
                    <label for="title" class="form-label">Titel</label>
                    <input type="text" id="title" class="form-control" th:field="*{title}"
                           th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('title')}"
                         th:errors="*{title}">Fehler</div>
                </div>

                <div class="mb-3">
                    <label for="description" class="form-label">Beschreibung</label>
                    <textarea id="description" class="form-control" rows="3"
                              th:field="*{description}"
                              th:classappend="${#fields.hasErrors('description')}
                                              ? 'is-invalid'"></textarea>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('description')}"
                         th:errors="*{description}">Fehler</div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="priority" class="form-label">Priorität</label>
                        <select id="priority" class="form-select" th:field="*{priority}">
                            <option th:each="p : ${priorities}" th:value="${p}"
                                    th:text="${p.label}">Priorität</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="dueDate" class="form-label">Fällig am</label>
                        <input type="date" id="dueDate" class="form-control" th:field="*{dueDate}">
                    </div>
                </div>

                <div class="mb-4">
                    <label for="categoryId" class="form-label">Kategorie</label>
                    <select id="categoryId" class="form-select" th:field="*{categoryId}"
                            th:classappend="${#fields.hasErrors('categoryId')} ? 'is-invalid'">
                        <option value="" disabled>Bitte wählen …</option>
                        <option th:each="c : ${categories}" th:value="${c.id}"
                                th:text="${c.name}">Kategorie</option>
                    </select>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('categoryId')}"
                         th:errors="*{categoryId}">Fehler</div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Speichern</button>
                    <a th:href="@{/tasks}" class="btn btn-outline-secondary">Abbrechen</a>
                </div>
            </form>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
