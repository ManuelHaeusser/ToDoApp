<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">To-Do</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<!-- Navigationsleiste -->
<nav th:fragment="navbar(active)" class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand fw-semibold" th:href="@{/tasks}">✓ To-Do</a>
        <ul class="navbar-nav">
            <li class="nav-item">
                <a class="nav-link" th:href="@{/tasks}"
                   th:classappend="${active == 'tasks'} ? 'active fw-semibold'">Aufgaben</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/categories}"
                   th:classappend="${active == 'categories'} ? 'active fw-semibold'">Kategorien</a>
            </li>
        </ul>
    </div>
</nav>

<!-- Erfolgsmeldung -->
<div th:fragment="messages">
    <div th:if="${message}"
         class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${message}">Meldung</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"
                aria-label="Schließen"></button>
    </div>
</div>

</body>
</html>
