# ------------------------------------------------------------------
# Anwendung
# ------------------------------------------------------------------
spring.application.name=todo-app
server.port=8080

# ------------------------------------------------------------------
# Datenbank: H2, dateibasiert -> persistente Speicherung auf der Platte.
# Die Daten liegen unter ./data/tododb.mv.db (relativ zum Startverzeichnis).
# AUTO_SERVER=TRUE erlaubt, dass die H2-Konsole parallel zur laufenden
# Anwendung auf dieselbe Datei zugreifen kann.
# ------------------------------------------------------------------
spring.datasource.url=jdbc:h2:file:./data/tododb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ------------------------------------------------------------------
# JPA / Hibernate
# ------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false

# ------------------------------------------------------------------
# H2-Konsole: erreichbar unter http://localhost:8080/h2-console
# JDBC-URL beim Login: jdbc:h2:file:./data/tododb
# Benutzer: sa   Passwort: (leer)
# ------------------------------------------------------------------
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ------------------------------------------------------------------
# Thymeleaf
# ------------------------------------------------------------------
spring.thymeleaf.cache=false
